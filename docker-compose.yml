services:
  # База данных для микросервиса авторизации (с pgvector)
  auth-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5435:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  # База данных для основного микросервиса (с pgvector)
  core-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_password
      POSTGRES_DB: core_db
    ports:
      - "5436:5432"
    volumes:
      - core_db_data:/var/lib/postgresql/data


  auth-service:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=auth
      - DATABASE_URL=postgresql+asyncpg://auth_user:${AUTH_PASSWORD}@auth-db:5432/auth_db
      - PORT=8001
    depends_on:
      - auth-db

  core-service:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SERVICE_NAME=core
      - DATABASE_URL=postgresql+asyncpg://core_user:${CORE_PASSWORD}@core-db:5432/core_db
      - PORT=8000
    depends_on:
      - core-db

volumes:
  auth_db_data:
  core_db_data:
